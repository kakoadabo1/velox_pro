name: velox_pro
description: VELOX Pro — app unique Livreur + Taxi VTC (Flutter).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

# ── Icône : fond VERT plein + le logo (un seul fichier requis) ──
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#A8FF00"
  adaptive_icon_foreground: "assets/logo.png"

# ── Splash : fond vert + logo ──
flutter_native_splash:
  color: "#A8FF00"
  image: assets/logo.png
  android_12:
    color: "#A8FF00"
    image: assets/logo.png
