name: velox_pro
description: VELOX Pro — app unique Livreur + Taxi VTC (Flutter).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

# ── Icône de l'application (sur le téléphone) ──
# Mets une image carrée 1024x1024 dans assets/icon/icon.png
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#0E0E0E"
  adaptive_icon_foreground: "assets/icon/icon.png"

# ── Écran de démarrage (splash) ──
# Mets ton logo VELOX (PNG, fond transparent de préférence) dans
# assets/splash/logo.png
flutter_native_splash:
  color: "#0E0E0E"
  image: assets/splash/logo.png
  android_12:
    color: "#0E0E0E"
    image: assets/splash/logo.png
