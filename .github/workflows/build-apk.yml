name: Build Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      # Flutter (récent) traite le projet en mode AGP 9 : nouveau DSL + Kotlin
      # intégré. Or ce projet est en AGP 8.11.1 (plugin kotlin-android, ancien
      # DSL) -> conflit "generateLockFiles". On rétablit l'ancien comportement
      # via le gradle.properties GLOBAL (~/.gradle), que Flutter ne réécrit PAS
      # (contrairement à android/gradle.properties qu'il régénère au build).
      - name: AGP 9 opt-out (global, survit à la réécriture Flutter)
        run: |
          mkdir -p ~/.gradle
          {
            echo "android.newDsl=false"
            echo "android.builtInKotlin=false"
          } >> ~/.gradle/gradle.properties
          echo "----- ~/.gradle/gradle.properties -----"
          cat ~/.gradle/gradle.properties

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: velox-client-apk
          path: build/app/outputs/flutter-apk/app-release.apk
